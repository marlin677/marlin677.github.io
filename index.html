<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal | FENZ Style</title>
    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-bg: #1a1a1a;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        /* --- HEADER & LOGO --- */
        .header-main {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 4%;
            z-index: 100;
        }

        .logo-box {
            width: 350px; 
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .logo-box img {
            width: 100%; 
            height: auto;
            filter: drop-shadow(2px 2px 10px rgba(0,0,0,0.5));
        }

        .emergency-contact {
            text-align: right;
            line-height: 1.1;
            padding-top: 10px;
        }

        .emergency-label {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
            text-transform: uppercase;
        }

        .emergency-number {
            font-size: 2.2rem;
            color: var(--fenz-yellow);
            font-weight: 900;
        }

        /* --- HERO SECTION --- */
        .hero {
            position: relative;
            height: 100vh;
            min-height: 700px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://www.fireandemergency.nz/assets/Uploads/FENZ-House_Burn_Levin-Hass_0084.jpg');
            background-size: cover;
            background-position: center;
        }

        .hero-container {
            width: 92%;
            max-width: 1600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 50px;
        }

        .hero-text {
            max-width: 600px;
        }

        .hero-text h1 {
            font-size: clamp(3.5rem, 9vw, 6rem);
            line-height: 0.9;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .btn-safety {
            display: inline-block;
            margin-top: 30px;
            background-color: var(--fenz-yellow);
            color: black;
            padding: 15px 35px;
            font-weight: 900;
            text-decoration: none;
            text-transform: uppercase;
            transition: 0.2s;
            font-size: 1.1rem;
        }

        .btn-safety:hover {
            background-color: white;
            transform: scale(1.05);
        }

        /* --- UPDATED MENU SECTION --- */
        .quick-links {
            text-align: left;
            border-left: 3px solid var(--fenz-red); /* Changed to red for emphasis */
            padding-left: 30px;
        }

        .menu-title {
            color: var(--fenz-yellow);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 900;
        }

        .quick-links a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }

        /* This makes the links move slightly when you hover over them */
        .quick-links a:hover {
            color: var(--fenz-yellow);
            padding-left: 15px;
            border-left: 4px solid var(--fenz-yellow);
        }

    </style>
</head>
<body>

    <header class="header-main">
        <div class="logo-box">
            <img src="https://raw.githubusercontent.com/marlin677/marlin77.github.io/main/FIRE%20AND%20EMERGENCY%20LOGO%201.png" alt="Fire and Emergency NZ">
        </div>

        <div class="emergency-contact">
            <div class="emergency-label">In Emergencies</div>
            <div class="emergency-number">Call 111</div>
        </div>
    </header>

    <section class="hero">
        <div class="hero-container">
            <div class="hero-text">
                <p style="color: var(--fenz-yellow); font-weight: bold; text-transform: uppercase; margin-bottom: 10px;">Internal Portal</p>
                <h1>LIVES<br>DEPEND<br>ON IT.</h1>
                <a href="#safety" class="btn-safety">Duty Status</a>
            </div>

            <nav class="quick-links">
                <div class="menu-title">Main Menu</div>
                <a href="#">Leadership</a>
                <a href="#">Ranks</a>
                <a href="#">Station Roster</a>
                <a href="#">My Profile</a>
                <a href="#">Fleet status</a>
                <a href="#">Contact Admin</a>
            </nav>
        </div>
    </section>

</body>
</html>
