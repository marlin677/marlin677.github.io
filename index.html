<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal | Safety First</title>
    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-grey: #1a1a1a;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            scroll-behavior: smooth;
            background-color: #1a1a1a; /* Fix: Keeps the page dark even if image fails */
        }

        /* --- HEADER --- */
        .header-main {
            position: absolute;
            top: 0;
            width: 100%;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
        }

        .logo-box {
            background-color: var(--fenz-red);
            border-bottom: 5px solid var(--fenz-yellow);
            width: 180px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-style: italic;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            /* Added a solid dark color as a backup for the image */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        #222 url('https://images.unsplash.com/photo-1516533075015-a3838414c3ca?auto=format&fit=crop&q=80&w=2070');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 10%;
            border-bottom: 10px solid var(--fenz-red);
        }

        .hero-content { color: white; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        
        .hero-text h1 { font-size: 4.5rem; margin: 0; font-weight: 900; line-height: 0.9; text-transform: uppercase; }
        
        .btn-skew {
            background: var(--fenz-yellow);
            color: black;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 30px;
            transform: skewX(-15deg);
            text-transform: uppercase;
        }
        .btn-skew span { display: inline-block; transform: skewX(15deg); }

        /* --- MENU --- */
        .quick-links { text-align: right; }
        .quick-links h3 { font-size: 0.8rem; color: var(--fenz-yellow); text-transform: uppercase; letter-spacing: 2px; }
        .quick-links a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            transition: 0.2s;
        }
        .quick-links a:hover { color: var(--fenz-yellow); transform: translateX(-10px); }

        /* --- SMOKE ALARMS SECTION --- */
        .safety-page {
            background-color: #ffffff;
            padding: 100px 10%;
            text-align: center;
        }

        .smoke-alarm-banner {
            background-color: var(--fenz-red);
            color: white;
            padding: 60px;
            border-radius: 2px;
        }
