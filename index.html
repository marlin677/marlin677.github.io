<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal</title>
    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
            --dark-overlay: rgba(0, 0, 0, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Hero Background Image */
        .hero {
            position: relative;
            height: 85vh; /* Adjusted to leave room for content below */
            background-image: url('https://images.unsplash.com/photo-1516533075015-a3838414c3ca?auto=format&fit=crop&q=80&w=2070'); /* Replace this with a screenshot of your station/trucks */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
        }

        /* Dark overlay to make text pop */
        .hero::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--dark-overlay);
        }

        /* Top Header Area */
        .header-top {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }

        .logo-placeholder {
            background-color: var(--fenz-red);
            padding: 10px 20px;
            color: white;
            font-weight: bold;
            font-style: italic;
            border-bottom: 4px solid var(--fenz-yellow);
        }

        /* Main Content within Hero */
        .hero-content {
            position: relative;
            z-index: 2;
            color: white;
            padding-left: 10%;
            width: 80%;
            display: flex;
            justify-content: space-between;
        }

        .hero-text h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .hero-text h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 0 0 20px 0;
            line-height: 1.1;
        }

        /* Yellow Action Button */
        .btn-yellow {
            background-color: var(--fenz-yellow);
            color: black;
            padding: 12px 25px;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            transform: skewX(-15deg); /* That iconic FENZ slant */
        }
        .btn-yellow span {
            display: inline-block;
            transform: skewX(15deg);
        }

        /* Sidebar Quick Links */
        .quick-links {
            text-align: left;
            margin-top: 50px;
        }

        .quick-links h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #ccc;
            margin-bottom: 20px;
        }

        .quick-links a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 2px solid transparent;
            width: fit-content;
        }

        .quick-links a:hover {
            border-bottom: 2px solid var(--fenz-yellow);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero-content { flex-direction: column; }
            .hero-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>

        <div class="logo-placeholder">
            DEPT LOGO HERE
        </div>
