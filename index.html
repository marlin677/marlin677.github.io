<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Portal | FENZ Style</title>
    <style>
        :root {
            --fenz-red: #d42027;
            --fenz-yellow: #ffed00;
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* Base dark color */
            color: white;
            font-family: 'Arial', sans-serif;
            scroll-behavior: smooth;
        }

        /* --- HEADER --- */
        .header-main {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 20px 5%;
            z-index: 10;
        }

        .logo-box {
            background-color: var(--fenz-red);
            border-bottom: 5px solid var(--fenz-yellow);
            width: 180px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* --- HERO --- */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://www.fireandemergency.nz/assets/Uploads/FENZ-House_Burn_Levin-Hass_0084.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            padding: 0 10%;
        }

        .hero-content {
            display: flex;
            justify-content: space-between;
            width: 100%;
            align-items: center;
        }

        .hero-text h1 {
            font-size: 5rem;
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
        }

        .btn-skew {
            background: var(--fenz-yellow);
            color: black;
            padding: 15px 30px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            transform: skewX(-15deg);
        }

        /* --- MENU --- */
        .quick-links a {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: right;
        }

        .quick-links a:hover { color: var(--fenz-yellow); }

        /* --- SAFETY SECTION --- */
        .safety-page {
            background-color: white;
            color: black;
            padding: 100px 10%;
            text-align: center;
        }

        .banner {
            background-color: var(--fenz-red);
            color: white;
            padding: 50px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header class="header-main">
        <div class="logo-box">
            <img src="https://github.com/marlin677/marlin77.github.io/blob/main/FIRE%20AND%20EMERGENCY%20LOGO%201.png" alt="FENZ" style="max-width: 150px;" onerror="this.style.display='none'">
            <span style="color:white; font-weight:bold;">LOGO</span>
        </div>
        <div style="text-align: right;">
            EMERGENCIES<br>
            <span style="font-size: 2rem; color: var(--fenz-yellow); font-weight: bold;">CALL 111</span>
        </div>
    </header>

    <section class="hero">
        <div class="hero-content">
            <div class="hero-text">
                <h1>LIVES<br>DEPEND<br>ON IT.</h1>
                <a href="#safety" class="btn-skew">SAFETY ADVICE</a>
            </div>
            <div class="quick-links">
                <a href="#safety">Smoke Alarms</a>
                <a href="#">Incidents</a>
                <a href="#">Key Documents</a>
                <a href="#">Fleet</a>
            </div>
        </div>
    </section>

    <section id="safety" class="safety-page">
        <div class="banner">
            <h2>Smoke Alarms Save Lives</h2>
        </div>
        <p style="margin-top: 30px; font-size: 1.2rem;">Working smoke alarms are the only way to wake up to fire. Test them monthly.</p>
    </section>

</body>
</html>
